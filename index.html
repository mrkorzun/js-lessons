      h1 {
        text-align: center;

      span {

  <body>
    <h1>
      Open
      <span>Dev-Mode</span>
      and check
      <span>Console</span>
    </h1>
    <div>
      <ul class="categories"></ul>
      <div class="participants-widget">
        <input
          type="text"
          class="participant-input"
          placeholder="Введіть ім'я" />
        <button type="button" class="add-participant">Додати</button>
        <ul class="participants-list"></ul>
      </div>
      <div class="reviews">
        <div class="review-card">Great service</div>
        <div class="review-card test">Test review 1</div>
        <div class="review-card">Fast delivery</div>
        <div class="review-card test">Test review 2</div>
      </div>
      <ul ul class="menu">
        <li class="menu-item active">Home</li>
        <li class="menu-item">Catalog</li>
        <li class="menu-item">Contacts</li>
      </ul>
      <section class="task like-task">
        <h2>Лічильник лайків</h2>
        <button class="btn" type="button">Like</button>
        <p class="result">
          <span class="count">0</span>
        </p>
      </section>

      <section class="task checkbox-task">
        <h2>Підтвердження</h2>
        <label class="agreement">
          <input type="checkbox" class="check" />
          Я погоджуюся з правилами сервісу
        </label>
        <button class="next-btn" type="button" disabled>Next</button>
        <p class="state">Статус: не підтверджено</p>
      </section>
    </div>
